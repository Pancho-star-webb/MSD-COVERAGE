function findZone(){
  let zip=document.getElementById("zipInput").value.trim();
  let resultBox=document.getElementById("result");

  for(let zone in zones){
    const match = zones[zone].data.find(item => item.zip === zip);
    if(match){
      resultBox.style.display="block";
      resultBox.innerHTML=`
        <div class="city">City: ${match.city}</div>
        <div class="zone">${zone.toUpperCase()}</div>
        <div class="price">Price: ${zones[zone].price}</div>
        <div class="days">Service Days: ${zones[zone].days}</div>
      `;
      return;
    }
  }

  resultBox.style.display="block";
  resultBox.innerHTML="ZIP Code not found in delivery zones.";
}
