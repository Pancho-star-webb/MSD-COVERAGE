<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Zone Pricing Search</title>

<style>

body{
font-family: Arial;
background:#f4f4f4;
text-align:center;
padding-top:100px;
}

.container{
background:white;
width:400px;
margin:auto;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
padding:10px;
width:200px;
font-size:16px;
}

button{
padding:10px 20px;
font-size:16px;
background:#3498db;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:#2980b9;
}

#result{
margin-top:20px;
font-size:18px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h2>Zone Price Checker</h2>

<p>Enter ZIP Code</p>

<input type="text" id="zip" placeholder="Example: 77002">

<br><br>

<button onclick="searchZone()">Search</button>

<div id="result"></div>

</div>

<script>

const pricing = {

1:{days:"Saturday Only", price:"$95.00"},
2:{days:"Tue, Thur, Sat", price:"$55.00"},
3:{days:"Tue, Thur, Sat", price:"$25.00"},
4:{days:"Tue, Thur, Sat", price:"$65.00"},
5:{days:"Tue, Thur, Sat", price:"$20.00"}

};


const zones = {

"77001":1,
"77002":1,
"77003":1,

"77004":2,
"77005":2,
"77006":2,

"77007":3,
"77008":3,

"77009":4,
"77010":4,

"77011":5,
"77012":5

};


function searchZone(){

let zip = document.getElementById("zip").value.trim();

let zone = zones[zip];

if(zone){

let result = pricing[zone];

document.getElementById("result").innerHTML =

"ZONE "+zone+
"<br>Days: "+result.days+
"<br>Price: "+result.price;

}else{

document.getElementById("result").innerHTML="ZIP code not found";

}

}

</script>

</body>
</html>
